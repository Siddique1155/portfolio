/* ================= NAVBAR ================= */

}

nav a{

}

}

/* ================= BUTTON ================= */

button{
background:#4e73df;
color:white;
padding:10px 18px;
border:none;

}

}

/* ================= PROJECTS ================= */

display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin:60px 20px;
}

.card{
background:white;
color:black;
padding:30px;
width:320px;
border-radius:15px;
box-shadow:0px 6px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* ================= FOOTER ================= */

footer{
margin-top:60px;
padding:20px;
background:rgba(0,0,0,0.2);
text-align:center;
}

/* ================= RESPONSIVE ================= */

.cards-container{
flex-direction:column;
align-items:center;
}

<script>

/* Dark Mode */
function toggleMode(){
document.body.classList.toggle("dark");
}

/* Typing Effect */
const text = "Frontend Developer | WordPress Developer | Freelancer";
let index = 0;

function typeEffect(){
document.getElementById("typingText").innerHTML =
text.substring(0,index);

index++;
if(index > text.length){
index = 0;
}
setTimeout(typeEffect,100);
}

typeEffect();

</script>

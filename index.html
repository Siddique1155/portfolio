<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Muhammad Siddique | Portfolio</title>

<!-- ================= SEO ================= -->
<meta name="description" content="Muhammad Siddique Portfolio - Frontend & WordPress Developer">
<meta name="keywords" content="Portfolio, Web Developer, WordPress, HTML, CSS, JavaScript">
<meta name="author" content="Muhammad Siddique">
<meta name="robots" content="index, follow">

<!-- ================= STYLE ================= -->
<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(to right,#4e73df,#1cc88a);
color:white;
transition:0.3s;
}

/* ===== Dark Mode ===== */
.dark{
background:#111;
color:white;
}

/* ===== NAVBAR ===== */
nav{
background:white;
padding:15px;
position:sticky;
top:0;
text-align:center;
z-index:1000;
}

nav a{
margin:15px;
text-decoration:none;
color:black;
font-weight:bold;
}

nav a:hover{
color:#4e73df;
}

/* ===== DARK BUTTON ===== */
.dark-btn{
background:#4e73df;
color:white;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.dark-btn:hover{
background:#2e59d9;
}

/* ===== HERO ===== */
.hero{
padding:100px 20px 50px;
text-align:center;
}

.hero h1{
font-size:40px;
}

/* ===== PROJECTS ===== */
.cards-container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin:60px 20px;
}

.card{
background:white;
color:black;
padding:30px;
width:320px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* ===== FOOTER ===== */
footer{
margin-top:60px;
padding:20px;
background:rgba(0,0,0,0.2);
text-align:center;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){

.cards-container{
flex-direction:column;
align-items:center;
}

.dark-btn{
margin-top:10px;
display:block;
}

}

</style>
</head>
<body>

<!-- ================= NAVIGATION ================= -->
<nav>
<a href="#">Home</a>
<a href="#projects">Projects</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>

<button class="dark-btn" onclick="toggleMode()">🌙 Dark Mode</button>

</nav>

<!-- ================= HERO ================= -->
<div class="hero">
<h1>Hi, I'm Muhammad Siddique</h1>
<p>Frontend Developer | WordPress Developer | Freelancer</p>
<button>Download CV</button>
</div>

<!-- ================= PROJECTS ================= -->
<div id="projects" class="cards-container">

<!-- Portfolio Project -->
<div class="card">
<img src="https://via.placeholder.com/300x180">
<h2>Portfolio Website</h2>
<p>Built with HTML, CSS & JavaScript.</p>
</div>

<!-- WordPress Project -->
<div class="card">
<img src="https://via.placeholder.com/300x180">
<h2>SIMS Kohat</h2>
<p>Official WordPress Website</p>

<a href="https://simskohat.com" target="_blank">
<button>Visit Website</button>
</a>

</div>

</div>

<!-- ================= FOOTER ================= -->
<footer>
<p>© 2026 Muhammad Siddique | All Rights Reserved</p>
</footer>

<!-- ================= SCRIPT ================= -->
<script>

function toggleMode(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>

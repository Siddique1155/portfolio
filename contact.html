<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Muhammad Siddique</title>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/style.css">

<style>
/* =================== NAVBAR =================== */
nav{
  background:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  position:relative;
  z-index:10;
}

.logo{ font-weight:bold; font-size:22px; }

.nav-links{
  display:flex;
  list-style:none;
  gap:20px;
}

.nav-links li a{
  text-decoration:none;
  color:black;
  font-weight:bold;
}

.nav-links li a:hover{ color:#4e73df; }

.menu-icon{
  display:none;
  font-size:24px;
  cursor:pointer;
}

/* =================== BODY & FORM =================== */
body{
  font-family: Arial, sans-serif;
  margin:0;
  background: linear-gradient(to right,#4e73df,#1cc88a);
  color:white;
}

/* Sections */
.section{
  max-width:1000px;
  margin:50px auto;
  padding:0 20px;
  text-align:center;
}
.section h2{ font-size:28px; margin-bottom:20px; }
.section p{ font-size:18px; margin-bottom:20px; }

/* Contact Form */
form{
  max-width:500px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}
input, textarea{
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
}
button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#4e73df;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{ background:#2e59d9; }

/* Footer */
footer{
  background: #1a1a1a;
  color: #fff;
  padding: 30px 20px;
  text-align: center;
  font-size: 14px;
}
.footer-container{
  max-width: 1200px;
  margin: auto;
}
.footer-links{
  margin: 10px 0;
}
.footer-links a{
  color: #fff;
  text-decoration: none;
  margin: 0 8px;
}
.footer-links a:hover{ color: #4e73df; }
.footer-social a{
  color: #fff;
  margin: 0 10px;
  font-size: 18px;
  text-decoration: none;
  transition: 0.3s;
}
.footer-social a:hover{ color: #4e73df; }

/* =================== RESPONSIVE =================== */
@media(max-width:768px){
  .nav-links{
    position:absolute;
    top:60px;
    left:0;
    width:100%;
    background:white;
    flex-direction:column;
    text-align:center;
    display:none;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
  }
  .nav-links li{
    padding:15px 0;
  }
  .nav-links.active{
    display:flex;
  }
  .menu-icon{
    display:block;
  }
  form{ width:90%; }
}
</style>
</head>
<body>

<!-- =================== NAVBAR =================== -->
<nav>
  <div class="logo"><strong>Siddique</strong></div>
  
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>

  <div class="menu-icon" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </div>
</nav>

<!-- =================== CONTACT SECTION =================== -->
<section class="section">
  <h2>Contact Me</h2>
  <p>Send me a message — I will reply as soon as possible.</p>

  <form action="https://formspree.io/f/yourformid" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</section>

<!-- =================== FOOTER =================== -->
<footer>
  <div class="footer-container">
    <p>© 2026 Muhammad Siddique | Available for Remote & Dubai Opportunities</p>

    <div class="footer-links">
      <a href="index.html">Home</a> |
      <a href="about.html">About</a> |
      <a href="projects.html">Projects</a> |
      <a href="contact.html">Contact</a>
    </div>

    <div class="footer-social">
      <a href="https://github.com/Siddique1155" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
      <a href="https://www.linkedin.com/in/YOUR-LINKEDIN-ID" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
      <a href="mailto:your.email@example.com" title="Email"><i class="fas fa-envelope"></i></a>
    </div>
  </div>
</footer>

<!-- =================== JAVASCRIPT =================== -->
<script>
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>

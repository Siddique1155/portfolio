<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Muhammad Siddique</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#4e73df,#1cc88a);
color:white;
}

/* ===== Container ===== */
.contact-container{
max-width:500px;
margin:60px auto;
background:white;
color:black;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* ===== Inputs ===== */
input, textarea{
width:100%;
padding:12px;
margin:8px 0 15px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

/* ===== Button ===== */
button{
background:#4e73df;
color:white;
padding:12px;
width:100%;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#2e59d9;
}

/* ===== Mobile ===== */
@media(max-width:600px){
.contact-container{
margin:30px 15px;
padding:25px;
}
}

</style>
</head>
<body>

<div class="contact-container">

<h2>📩 Contact Me</h2>
<p>Send me a message — I will reply as soon as possible.</p>

<form action="https://formspree.io/f/xreajqzd" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Message</label>
<textarea name="message" rows="5" required></textarea>

<button type="submit">Send Message 🚀</button>

</form>

</div>

</body>
</html>

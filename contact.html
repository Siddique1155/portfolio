<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me | Muhammad Siddique</title>

<style>

/* ===== Contact Form Styles ===== */
.contact-section{
    background: #fff;
    color: #333;
    padding: 50px 20px;
    max-width: 450px;
    margin: auto;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.contact-section h2{
    text-align: center;
    margin-bottom: 20px;
    font-size: 24px;
}

.contact-section label{
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

.contact-section input,
.contact-section textarea{
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

.contact-section button{
    background: #4e73df;
    color: #fff;
    padding: 10px 18px;
    margin-top: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.contact-section button:hover{
    background: #2e59d9;
}

</style>
</head>
<body>

<div class="contact-section">
    <h2>Contact Me</h2>

    <form action="https://formspree.io/f/xreajqzd" method="POST">

        <label for="name">Your Name</label>
        <input type="text" name="name" id="name" required>

        <label for="email">Your Email</label>
        <input type="email" name="email" id="email" required>

        <label for="message">Message</label>
        <textarea name="message" id="message" rows="6" required></textarea>

        <button type="submit">Send Message</button>

    </form>
</div>

</body>
</html>
